{% load static %}
<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airfoil Optimization Dashboard</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        navy: {50:'#f0f4f8',100:'#d9e2ec',200:'#bcccdc',300:'#9fb3c8',400:'#829ab1',500:'#627d98',600:'#486581',700:'#334e68',800:'#243b53',900:'#102a43'},
        cyan: {400:'#22d3ee',500:'#06b6d4',600:'#0891b2'}
      } } }
    }
  </script>
  <link rel="stylesheet" href="{% static 'optimizer/css/style.css' %}">
</head>
<body class="h-full bg-navy-50 text-navy-900">
<div id="app" class="h-full w-full flex flex-col overflow-auto">
  <header class="flex items-center justify-between px-6 py-3 bg-white border-b border-navy-100 shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg bg-navy-800 flex items-center justify-center">✈️</div>
      <div>
        <h1 id="topTitle" class="text-sm font-bold text-navy-900 leading-tight">Airfoil Optimization with XAI Analysis</h1>
        <p id="topSubtitle" class="text-[11px] text-navy-400 leading-tight">DRL Models: PPO, TD3, SAC with Explainability</p>
      </div>
    </div>
    <span class="inline-flex items-center gap-1 px-2 py-1 rounded-full bg-emerald-50 text-emerald-600 text-[11px] font-medium">
      <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>Model Ready
    </span>
  </header>

  <div class="flex flex-1 min-h-0">
    <aside class="w-[320px] shrink-0 bg-white border-r border-navy-100 overflow-y-auto p-5 flex flex-col gap-4">
      <div class="p-3 rounded-lg bg-navy-50 border border-navy-100">
        <p class="text-[11px] font-semibold text-navy-500 uppercase tracking-wider mb-2">DRL Model Selection</p>
        <div class="space-y-2">
          <label class="flex items-center gap-2"><input type="radio" name="modelSelect" value="PPO" checked class="w-4 h-4 accent-cyan-500"> <span class="text-sm">PPO</span></label>
          <label class="flex items-center gap-2"><input type="radio" name="modelSelect" value="TD3" class="w-4 h-4 accent-cyan-500"> <span class="text-sm">TD3</span></label>
          <label class="flex items-center gap-2"><input type="radio" name="modelSelect" value="SAC" class="w-4 h-4 accent-cyan-500"> <span class="text-sm">SAC</span></label>
        </div>
      </div>
      <div class="space-y-3">
        <input id="aoa" type="number" value="2.5" step="0.1" class="mono w-full text-sm px-3 py-2 rounded-md border border-navy-200" />
        <input id="reynolds" type="number" value="6000000" step="100000" class="mono w-full text-sm px-3 py-2 rounded-md border border-navy-200" />
        <input id="upper" type="text" value="0.18, 0.22, 0.15, 0.10" class="mono w-full text-sm px-3 py-2 rounded-md border border-navy-200" />
        <input id="lower" type="text" value="-0.08, -0.12, -0.09, -0.04" class="mono w-full text-sm px-3 py-2 rounded-md border border-navy-200" />
        <div class="grid grid-cols-2 gap-3">
          <input id="le" type="number" value="0.25" step="0.01" class="mono w-full text-sm px-3 py-2 rounded-md border border-navy-200" />
          <input id="te" type="number" value="0.002" step="0.001" class="mono w-full text-sm px-3 py-2 rounded-md border border-navy-200" />
        </div>
      </div>
      <button id="optimizeBtn" class="w-full py-3 rounded-lg bg-navy-800 hover:bg-navy-900 text-white font-semibold text-sm">Optimize & Explain</button>
      <div class="text-[11px] text-emerald-700" id="modelStatus">PPO model loaded</div>
    </aside>
    <main class="flex-1 overflow-y-auto p-5 grid-bg">
      <div class="bg-white rounded-xl border border-navy-100 p-4 mb-4"><svg id="airfoilChart" width="100%" height="280" viewBox="0 0 800 280"><path id="initialAirfoil" fill="none" stroke="#9fb3c8" stroke-width="2"/><path id="optimizedAirfoil" fill="rgba(6,182,212,0.08)" stroke="#06b6d4" stroke-width="2"/></svg></div>
      <div class="grid grid-cols-5 gap-3" id="metrics"></div>
      <div class="grid grid-cols-2 gap-3 mt-3">
        <div class="bg-white rounded-xl border border-navy-100 p-4" id="constraints"></div>
        <div class="bg-white rounded-xl border border-navy-100 p-4" id="xai"></div>
      </div>
      <div class="bg-white rounded-xl border border-navy-100 p-4 mt-3" id="pipeline"></div>
      <div class="bg-white rounded-xl border border-navy-100 p-4 mt-3" id="experiment"></div>
    </main>
  </div>
</div>
<script src="{% static 'optimizer/js/app.js' %}"></script>
</body>
</html>
